<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Factory</title>
  <style>
    @font-face { font-family: 'Exp-n100'; src: url('exposure/ExposureTrial[-100].otf'); }
    @font-face { font-family: 'Exp-n90';  src: url('exposure/ExposureTrial[-90].otf'); }
    @font-face { font-family: 'Exp-n80';  src: url('exposure/ExposureTrial[-80].otf'); }
    @font-face { font-family: 'Exp-n70';  src: url('exposure/ExposureTrial[-70].otf'); }
    @font-face { font-family: 'Exp-n60';  src: url('exposure/ExposureTrial[-60].otf'); }
    @font-face { font-family: 'Exp-n50';  src: url('exposure/ExposureTrial[-50].otf'); }
    @font-face { font-family: 'Exp-n40';  src: url('exposure/ExposureTrial[-40].otf'); }
    @font-face { font-family: 'Exp-n30';  src: url('exposure/ExposureTrial[-30].otf'); }
    @font-face { font-family: 'Exp-n20';  src: url('exposure/ExposureTrial[-20].otf'); }
    @font-face { font-family: 'Exp-n10';  src: url('exposure/ExposureTrial[-10].otf'); }
    @font-face { font-family: 'Exp-0';    src: url('exposure/ExposureTrial[0].otf'); }
    @font-face { font-family: 'Exp-p10';  src: url('exposure/ExposureTrial[+10].otf'); }
    @font-face { font-family: 'Exp-p20';  src: url('exposure/ExposureTrial[+20].otf'); }
    @font-face { font-family: 'Exp-p30';  src: url('exposure/ExposureTrial[+30].otf'); }
    @font-face { font-family: 'Exp-p40';  src: url('exposure/ExposureTrial[+40].otf'); }
    @font-face { font-family: 'Exp-p50';  src: url('exposure/ExposureTrial[+50].otf'); }
    @font-face { font-family: 'Exp-p60';  src: url('exposure/ExposureTrial[+60].otf'); }
    @font-face { font-family: 'Exp-p70';  src: url('exposure/ExposureTrial[+70].otf'); }
    @font-face { font-family: 'Exp-p80';  src: url('exposure/ExposureTrial[+80].otf'); }
    @font-face { font-family: 'Exp-p90';  src: url('exposure/ExposureTrial[+90].otf'); }
    @font-face { font-family: 'Exp-p100'; src: url('exposure/ExposureTrial[+100].otf'); }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: #0a0a0a;
      color: #ededed;
      overflow: hidden;
    }

    .stage {
      position: relative;
      text-align: center;
    }

    .layer {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 400;
      letter-spacing: 0.02em;
      line-height: 1.1;
      font-family: 'Exp-0', serif;
    }

    .layer-a, .layer-b {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
    }

    .layer-ref {
      visibility: hidden;
    }
  </style>
</head>
<body>
  <div class="stage">
    <h1 class="layer layer-ref">Gain exposure.<br>Make an impact.<br>BE SEEN.</h1>
    <h1 class="layer layer-a" aria-hidden="true">Gain exposure.<br>Make an impact.<br>BE SEEN.</h1>
    <h1 class="layer layer-b" aria-hidden="true">Gain exposure.<br>Make an impact.<br>BE SEEN.</h1>
  </div>
  <script>
    const fonts = [
      'Exp-n100','Exp-n90','Exp-n80','Exp-n70','Exp-n60',
      'Exp-n50','Exp-n40','Exp-n30','Exp-n20','Exp-n10',
      'Exp-0',
      'Exp-p10','Exp-p20','Exp-p30','Exp-p40','Exp-p50',
      'Exp-p60','Exp-p70','Exp-p80','Exp-p90','Exp-p100'
    ];

    // Preload all fonts
    Promise.all(fonts.map(f => document.fonts.load(`1em "${f}"`))).then(start);

    function start() {
      const a = document.querySelector('.layer-a');
      const b = document.querySelector('.layer-b');
      const total = fonts.length;
      const cycleDuration = 6000; // full cycle in ms
      const steps = (total - 1) * 2; // ping-pong steps
      let prev = -1;

      function tick(now) {
        const t = (now % cycleDuration) / cycleDuration;
        // Sine easing for smooth acceleration/deceleration at extremes
        const sine = (Math.sin(t * Math.PI * 2 - Math.PI / 2) + 1) / 2;
        const idx = Math.round(sine * (total - 1));

        if (idx !== prev) {
          const next = (idx === prev) ? idx : idx;
          const fontName = fonts[idx];
          // Crossfade: incoming layer goes on top
          const incoming = prev === -1 || idx > prev ? a : b;
          const outgoing = incoming === a ? b : a;

          incoming.style.fontFamily = `'${fontName}', serif`;
          incoming.style.opacity = '1';
          outgoing.style.opacity = '0';
          incoming.style.transition = 'opacity 80ms ease';
          outgoing.style.transition = 'opacity 80ms ease';

          prev = idx;
        }
        requestAnimationFrame(tick);
      }

      a.style.opacity = '1';
      b.style.opacity = '0';
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
